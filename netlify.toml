# ==============================================================================
# Configuration Netlify pour Next.js - Gestion Locative
# https://docs.netlify.com/integrations/frameworks/next-js/overview/
# ==============================================================================

[build]
  command = "npm run build"
  publish = ".next"

# Plugin Next.js pour Netlify (requis)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Variables d'environnement de build
[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  NETLIFY = "true"  # Désactive PWA sur Netlify
  # Fix OOM: augmenter le heap Node pour le build Next.js (défaut ~1.7 GB)
  NODE_OPTIONS = "--max_old_space_size=8192"

# ==============================================================================
# VARIABLES D'ENVIRONNEMENT À CONFIGURER DANS L'UI NETLIFY
# Site settings > Environment variables
# ==============================================================================
#
# 🔴 REQUISES:
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY
#   - SUPABASE_SERVICE_ROLE_KEY (🔒 secret)
#   - API_KEY_MASTER_KEY (🔒 secret)
#   - CSRF_SECRET (🔒 secret, ≥32 chars — `openssl rand -hex 32`)
#   - NEXT_PUBLIC_APP_URL (ex: https://votre-site.netlify.app)
#
# 🟡 OPTIONNELLES (selon fonctionnalités activées):
#   - OPENAI_API_KEY (🔒 secret) - pour les fonctionnalités IA
#   - STRIPE_SECRET_KEY (🔒 secret) - pour les paiements
#   - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY - pour les paiements
#   - RESEND_API_KEY (🔒 secret) - pour les emails
#   - TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN (🔒 secrets) - pour les SMS
#   - TWILIO_VERIFY_SERVICE_SID - pour les OTP téléphone (Twilio Verify)
#   - TWILIO_PHONE_NUMBER ou TWILIO_MESSAGING_SERVICE_SID - numéro d'envoi
#   - CRON_SECRET (🔒 secret) - pour authentifier les appels cron
#   - NEXT_PUBLIC_SENTRY_DSN - pour le monitoring
#   - NEXT_PUBLIC_POSTHOG_KEY - pour les analytics
#
# ⚠️  IMPORTANT: Les variables marquées 🔒 sont secrètes et ne doivent
#     JAMAIS commencer par NEXT_PUBLIC_ pour éviter l'exposition au client.
# ==============================================================================

# ==============================================================================
# CRON SCHEDULING (Supabase pg_cron + pg_net)
# ==============================================================================
# Les routes /api/cron/* sont des API routes Next.js standard.
# Elles sont déclenchées automatiquement par Supabase pg_cron + pg_net.
#
# Configuration via la migration SQL :
#   supabase/migrations/20260304100000_activate_pg_cron_schedules.sql
#
# Prérequis dans le dashboard Supabase (SQL Editor) :
#   ALTER DATABASE postgres SET app.settings.app_url = 'https://votre-site.netlify.app';
#   ALTER DATABASE postgres SET app.settings.cron_secret = 'votre-cron-secret';
#
# Header requis par chaque endpoint :
#   Authorization: Bearer $CRON_SECRET
# ==============================================================================

# ==============================================================================
# HEADERS & REDIRECTS
# Tous les headers sont définis dans next.config.js > headers()
# pour éviter les conflits avec @netlify/plugin-nextjs qui génère
# automatiquement le fichier _headers à partir de la config Next.js.
# Ne PAS dupliquer les headers ici, sinon le plugin peut produire
# un fichier _headers invalide et le deploy échoue.
# ==============================================================================

